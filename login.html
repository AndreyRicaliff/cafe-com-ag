<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Café com AG — Login</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0A0A0A;--surface:#141414;--border:#2A2A2A;
      --purple:#7B68BB;--purple-light:#9D8ED4;--purple-dim:rgba(123,104,187,0.15);
      --red:#C0392B;--red-dim:rgba(192,57,43,0.15);
      --white:#FFFFFF;--muted:#666;--text:#E0E0E0;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}

    .login-box{background:var(--surface);border:0.5px solid var(--border);border-radius:20px;padding:3rem 2.5rem;width:100%;max-width:420px;text-align:center}
    .login-brand{font-size:16px;font-weight:500;color:var(--white);letter-spacing:2px;text-transform:uppercase;margin-top:.75rem}
    .login-sub{font-size:11px;color:var(--purple);letter-spacing:3px;text-transform:uppercase;margin-top:4px}
    .login-title{font-size:20px;font-weight:600;color:var(--white);margin:2rem 0 .5rem}
    .login-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:1.5rem}
    .login-domain{display:inline-block;font-size:11px;color:var(--purple-light);background:var(--purple-dim);border:0.5px solid var(--purple);border-radius:6px;padding:4px 12px;margin-bottom:2rem;letter-spacing:.5px}
    .login-btn-wrap{display:flex;justify-content:center;min-height:44px}
    .login-error{font-size:12px;color:#e05a4a;background:var(--red-dim);border:0.5px solid var(--red);border-radius:8px;padding:.75rem 1rem;margin-top:1.5rem;display:none;line-height:1.5}
    .login-footer{font-size:10px;color:#333;margin-top:2rem;letter-spacing:.3px}
  </style>
</head>
<body>
  <div class="login-box">
    <svg width="52" height="52" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="44" height="44" rx="8" fill="#141414"/>
      <polygon points="22,8 8,30 13,30 22,14 31,30 36,30" fill="white"/>
      <rect x="28" y="20" width="8" height="10" fill="white"/>
    </svg>
    <div class="login-brand">AG Consultoria</div>
    <div class="login-sub">Café com AG ☕</div>

    <div class="login-title">Calendário Editorial</div>
    <div class="login-desc">Agenda interna do time para o programa de YouTube.<br>Acesso restrito ao domínio corporativo.</div>
    <span class="login-domain">@agconsultorialtda.com</span>

    <div class="login-btn-wrap" id="google-btn"></div>

    <div class="login-error" id="login-error">
      Acesso negado. Apenas contas <strong>@agconsultorialtda.com</strong> têm permissão.
    </div>

    <div class="login-footer">AG Consultoria Ltda · uso interno</div>
  </div>

  <script>
    const GOOGLE_CLIENT_ID = '353720892078-14r0l8kpftkai4tg5q59ss4loinuria9.apps.googleusercontent.com';
    const ALLOWED_DOMAIN   = 'agconsultorialtda.com';

    function parseJwt(token) {
      const b64 = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
      return JSON.parse(decodeURIComponent(atob(b64).split('').map(c => '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join('')));
    }

    function onGoogleLogin(response) {
      const payload = parseJwt(response.credential);
      const email   = payload.email || '';
      const hd      = payload.hd   || '';
      if (hd !== ALLOWED_DOMAIN || !email.endsWith('@' + ALLOWED_DOMAIN)) {
        document.getElementById('login-error').style.display = 'block';
        return;
      }
      localStorage.setItem('cag_session', JSON.stringify({ email, name: payload.name || email }));
      window.location.href = 'index.html';
    }

    window.addEventListener('load', () => {
      if (localStorage.getItem('cag_session')) {
        window.location.href = 'index.html';
        return;
      }
      const script = document.createElement('script');
      script.src = 'https://accounts.google.com/gsi/client';
      script.onload = () => {
        google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: onGoogleLogin, auto_select: false, hd: ALLOWED_DOMAIN });
        google.accounts.id.renderButton(document.getElementById('google-btn'), {
          theme: 'filled_black', size: 'large', text: 'signin_with', shape: 'rectangular', width: 280, locale: 'pt-BR'
        });
      };
      document.head.appendChild(script);
    });
  </script>
</body>
</html>
